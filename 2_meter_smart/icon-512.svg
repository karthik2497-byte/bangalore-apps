<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Auto-rickshaw body -->
  <g transform="translate(256,270)" fill="#FFFFFF">
    <!-- Main cabin -->
    <rect x="-86" y="-75" width="128" height="96" rx="16" ry="16"/>
    <!-- Roof / canopy -->
    <path d="M-90,-75 Q-90,-128 -26,-128 L26,-128 Q54,-128 44,-75 Z"/>
    <!-- Front section -->
    <rect x="42" y="-48" width="58" height="70" rx="10" ry="10"/>
    <!-- Front mudguard curve -->
    <path d="M100,-26 Q128,-26 128,6 L128,22 L100,22 Z"/>
    <!-- Handlebar -->
    <rect x="100" y="-54" width="10" height="38" rx="5" fill="#FFFFFF"/>
    <!-- Headlight -->
    <circle cx="122" cy="-16" r="8" fill="#FBBF24"/>
  </g>
  <!-- Wheels -->
  <circle cx="192" cy="362" r="30" fill="#0F172A"/>
  <circle cx="192" cy="362" r="14" fill="#FFFFFF"/>
  <circle cx="368" cy="362" r="30" fill="#0F172A"/>
  <circle cx="368" cy="362" r="14" fill="#FFFFFF"/>
  <!-- Green meter/checkmark indicator -->
  <circle cx="400" cy="138" r="42" fill="#10B981"/>
  <path d="M378,138 L394,154 L422,122" stroke="#FFFFFF" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
