<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="96" cy="96" r="96" fill="url(#bg)"/>
  <!-- Auto-rickshaw body -->
  <g transform="translate(96,100)" fill="#FFFFFF">
    <!-- Main cabin -->
    <rect x="-32" y="-28" width="48" height="36" rx="6" ry="6"/>
    <!-- Roof / canopy -->
    <path d="M-34,-28 Q-34,-48 -10,-48 L10,-48 Q20,-48 16,-28 Z"/>
    <!-- Front section -->
    <rect x="16" y="-18" width="22" height="26" rx="4" ry="4"/>
    <!-- Front mudguard curve -->
    <path d="M38,-10 Q48,-10 48,2 L48,8 L38,8 Z"/>
    <!-- Handlebar -->
    <rect x="38" y="-20" width="4" height="14" rx="2" fill="#FFFFFF"/>
    <!-- Headlight -->
    <circle cx="46" cy="-6" r="3" fill="#FBBF24"/>
  </g>
  <!-- Wheels -->
  <circle cx="72" cy="136" r="11" fill="#0F172A"/>
  <circle cx="72" cy="136" r="5" fill="#FFFFFF"/>
  <circle cx="138" cy="136" r="11" fill="#0F172A"/>
  <circle cx="138" cy="136" r="5" fill="#FFFFFF"/>
  <!-- Green meter/checkmark indicator -->
  <circle cx="150" cy="52" r="16" fill="#10B981"/>
  <path d="M142,52 L148,58 L158,46" stroke="#FFFFFF" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
