  <g transform="translate(130, 38)">
    <!-- Shield shape -->
    <path d="M16 4 L28 9 L28 18 C28 25 22 30 16 32 C10 30 4 25 4 18 L4 9 Z" fill="white"/>
    <!-- Checkmark inside shield -->
    <polyline points="10,18 14,22 22,13" fill="none" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
