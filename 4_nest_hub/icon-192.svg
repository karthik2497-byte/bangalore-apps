  <!-- Main building - center tall tower -->
  <rect x="68" y="52" width="56" height="96" rx="3" fill="white"/>
  <!-- Left wing -->
  <rect x="40" y="76" width="32" height="72" rx="3" fill="rgba(255,255,255,0.85)"/>
  <!-- Right wing -->
  <rect x="120" y="76" width="32" height="72" rx="3" fill="rgba(255,255,255,0.85)"/>
  <!-- Center tower windows - row 1 -->
  <rect x="76" y="60" width="10" height="10" rx="1.5" fill="#0D9488" opacity="0.5"/>
