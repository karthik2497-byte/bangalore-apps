  <rect x="91" y="92" width="10" height="10" rx="1.5" fill="#0D9488" opacity="0.35"/>
  <rect x="106" y="92" width="10" height="10" rx="1.5" fill="#0D9488" opacity="0.35"/>
  <!-- Center tower windows - row 4 -->
  <rect x="76" y="108" width="10" height="10" rx="1.5" fill="#0D9488" opacity="0.3"/>
  <rect x="91" y="108" width="10" height="10" rx="1.5" fill="#0D9488" opacity="0.3"/>
  <rect x="106" y="108" width="10" height="10" rx="1.5" fill="#0D9488" opacity="0.3"/>
  <!-- Center entrance door -->
  <rect x="88" y="128" width="16" height="20" rx="8" fill="#0D9488" opacity="0.4"/>
  <!-- Left wing windows - row 1 -->
  <rect x="47" y="84" width="8" height="8" rx="1.5" fill="#0D9488" opacity="0.4"/>
  <rect x="59" y="84" width="8" height="8" rx="1.5" fill="#0D9488" opacity="0.4"/>
  <!-- Left wing windows - row 2 -->
  <rect x="47" y="98" width="8" height="8" rx="1.5" fill="#0D9488" opacity="0.35"/>
  <rect x="59" y="98" width="8" height="8" rx="1.5" fill="#0D9488" opacity="0.35"/>
  <!-- Left wing windows - row 3 -->
  <rect x="47" y="112" width="8" height="8" rx="1.5" fill="#0D9488" opacity="0.3"/>
  <rect x="59" y="112" width="8" height="8" rx="1.5" fill="#0D9488" opacity="0.3"/>
