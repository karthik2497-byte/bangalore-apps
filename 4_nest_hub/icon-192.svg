  <rect x="91" y="76" width="10" height="10" rx="1.5" fill="#0D9488" opacity="0.4"/>
  <rect x="106" y="76" width="10" height="10" rx="1.5" fill="#0D9488" opacity="0.4"/>
  <!-- Center tower windows - row 3 -->
