name: Build Android AABs

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app to build (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - 1_power_pulse
          - 2_meter_smart
          - 3_pg_buddy
          - 4_nest_hub
          - 5_lingo_local
          - 6_stock_ping
          - 7_card_guard

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.app }}" = "all" ]; then
            echo 'matrix={"include":[{"name":"PowerPulse","dir":"1_power_pulse"},{"name":"MeterSmart","dir":"2_meter_smart"},{"name":"PGBuddy","dir":"3_pg_buddy"},{"name":"NestHub","dir":"4_nest_hub"},{"name":"LingoLocal","dir":"5_lingo_local"},{"name":"StockPing","dir":"6_stock_ping"},{"name":"CardGuard","dir":"7_card_guard"}]}' >> "$GITHUB_OUTPUT"
          else
            DIR="${{ github.event.inputs.app }}"
            NAME=$(echo "$DIR" | sed 's/^[0-9]*_//' | sed 's/_/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) substr($i,2)}1' | tr -d ' ')
            echo "matrix={\"include\":[{\"name\":\"$NAME\",\"dir\":\"$DIR\"}]}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap Core
        run: cd scripts && npm init -y && npm install @bubblewrap/core

      - name: Write Bubblewrap config
        run: |
          mkdir -p "$HOME/.bubblewrap"
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > "$HOME/.bubblewrap/config.json"
          cat "$HOME/.bubblewrap/config.json"

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore "$GITHUB_WORKSPACE/android.keystore" \
            -alias android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "bangaloreapps123" \
            -keypass "bangaloreapps123" \
            -dname "CN=Karthik, O=BangaloreApps, L=Bangalore, ST=Karnataka, C=IN"

      - name: Generate TWA project (non-interactive)
        run: |
          MANIFEST_URL="https://karthik2497-byte.github.io/bangalore-apps/${{ matrix.dir }}/manifest.json"
          BUILD_DIR="build_${{ matrix.dir }}"

          # Use @bubblewrap/core directly to avoid interactive CLI prompts.
          node scripts/generate-twa.mjs \
            "$MANIFEST_URL" \
            "$BUILD_DIR" \
            "$GITHUB_WORKSPACE/android.keystore"

          echo "=== Generated files ==="
          ls -la "$BUILD_DIR/"
          echo "=== twa-manifest.json ==="
          cat "$BUILD_DIR/twa-manifest.json"

      - name: Build APK and AAB with Gradle
        working-directory: build_${{ matrix.dir }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace

      - name: Sign APK
        working-directory: build_${{ matrix.dir }}
        run: |
          UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED_APK="app-release-aligned.apk"
          SIGNED_APK="app-release-signed.apk"

          # Zipalign
          "${ANDROID_HOME}/build-tools/$(ls "${ANDROID_HOME}/build-tools/" | sort -V | tail -1)/zipalign" \
            -v -p 4 "$UNSIGNED_APK" "$ALIGNED_APK"

          # Sign with apksigner
          "${ANDROID_HOME}/build-tools/$(ls "${ANDROID_HOME}/build-tools/" | sort -V | tail -1)/apksigner" sign \
            --ks "$GITHUB_WORKSPACE/android.keystore" \
            --ks-key-alias android \
            --ks-pass pass:bangaloreapps123 \
            --key-pass pass:bangaloreapps123 \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          echo "Signed APK: $SIGNED_APK"
          ls -la "$SIGNED_APK"

      - name: Sign AAB
        working-directory: build_${{ matrix.dir }}
        run: |
          UNSIGNED_AAB="app/build/outputs/bundle/release/app-release.aab"
          SIGNED_AAB="app-release-bundle.aab"

          jarsigner -verbose \
            -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore "$GITHUB_WORKSPACE/android.keystore" \
            -storepass "bangaloreapps123" \
            -keypass "bangaloreapps123" \
            "$UNSIGNED_AAB" android

          # Copy signed AAB to expected output name
          cp "$UNSIGNED_AAB" "$SIGNED_AAB"

          echo "Signed AAB: $SIGNED_AAB"
          ls -la "$SIGNED_AAB"

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.name }}-aab
          path: build_${{ matrix.dir }}/app-release-bundle.aab
          if-no-files-found: warn

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.name }}-apk
          path: build_${{ matrix.dir }}/app-release-signed.apk
          if-no-files-found: warn
